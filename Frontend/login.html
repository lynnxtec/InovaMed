<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InovaMed</title>
    <link rel="stylesheet" href="login.css"><link rel="stylesheet" href="css/login.css">
<body>
    <div class="login-wrapper">
        <div class="container">
            <!-- Logo dentro do box -->
            <div class="logo-inside">
                <img src="img/logo.inovamed-removebg-preview (1).png" alt="InovaMed Logo">
            </div>
            
            <h2>Login</h2>
            
            <form id="form-login" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Usuário:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="lembrar">
                    <label for="lembrar">Lembrar meu acesso</label>
                </div>
                
                <button type="submit">Entrar</button>
            </form>
            
            <p class="forgot-link">
                <a href="./esquecisenha.html">Esqueci minha senha</a>
            </p>

            <p class="register-link">
                Não tem uma conta? 
                <a href="registro.html">Cadastre-se</a>
            </p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
