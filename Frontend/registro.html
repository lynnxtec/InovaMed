<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - InovaMed</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="container">
            <div class="logo-inside">
                <img src="img/logo.inovamed-removebg-preview (1).png" alt="InovaMed Logo">
            </div>
            
            <h2>Criar Conta</h2>
            
            <form id="form-registro">
                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" required>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label>Tipo de usuário:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="tipo" id="tipoPaciente" value="paciente" checked> 
                            Paciente
                        </label>
                        <label>
                            <input type="radio" name="tipo" id="tipoMedico" value="medico"> 
                            Médico
                        </label>
                    </div>
                </div>
                
                <!-- CAMPO EXTRA PARA MÉDICOS -->
                <div class="form-group" id="campoCRM" style="display: none;">
                    <label for="crm">CRM:</label>
                    <input type="text" id="crm" placeholder="Número do CRM">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmar_senha">Confirmar senha:</label>
                    <input type="password" id="confirmar_senha" required>
                </div>
                
                <button type="submit">Cadastrar</button>
            </form>
            
            <p class="register-link">
                Já tem uma conta? 
                <a href="login.html">Fazer login</a>
            </p>
        </div>
    </div>

    <script src="registro.js"></script>
</body>
</html>
