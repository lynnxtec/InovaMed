<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registro - InovaMed</title>
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="container">
        <h1>InovaMed</h1>
        <h2>Criar Conta</h2>
        
        <form id="form-registro">
            <div class="form-group">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" required>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Tipo de usuário:</label>
                <div style="margin: 10px 0;">
                    <label style="margin-right: 20px;">
                        <input type="radio" name="tipo" id="tipoPaciente" value="paciente" checked> 
                        Paciente
                    </label>
                    <label>
                        <input type="radio" name="tipo" id="tipoMedico" value="medico"> 
                        Médico
                    </label>
                </div>
            </div>
            
            <!-- CAMPO EXTRA PARA MÉDICOS (opcional) -->
            <div class="form-group" id="campoCRM" style="display: none;">
                <label for="crm">CRM (para médicos):</label>
                <input type="text" id="crm" placeholder="Número do CRM">
            </div>
            
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" required>
            </div>
            
            <div class="form-group">
                <label for="confirmar_senha">Confirmar senha:</label>
                <input type="password" id="confirmar_senha" required>
            </div>
            
            <br>
            <button type="submit">Cadastrar</button>
        </form>
        
        <p>
            Já tem uma conta? 
            <a href="login.html">Fazer login</a>
        </p>
    </div>

    <script src="js/registro.js"></script>
</body>
</html>
